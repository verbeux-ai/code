name: Deploy Release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: deploy-release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release artifact
    if: ${{ github.repository == 'verbeux-ai/code' && !github.event.release.draft }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    permissions:
      contents: read
    steps:
      - name: Resolve release tag
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          case "$RELEASE_TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Release tag must use the vMAJOR.MINOR.PATCH format; got: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Validate release version
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          node -e 'const version = require("./package.json").version; const tag = process.env.RELEASE_TAG; if (`v${version}` !== tag) { console.error(`package.json is ${version}, but the published release is ${tag}`); process.exit(1) }'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release-critical tests
        run: |
          bun test --max-concurrency=1 \
            src/commands/effort/effort.verboo.test.ts \
            src/commands/logout/logoutState.test.ts \
            src/services/api/openaiShim.test.ts \
            src/services/api/verbooCheckout.test.ts \
            src/services/api/verbooModels.test.ts \
            src/services/oauth/purchaseFlow.test.ts \
            src/services/oauth/pastDueFlow.test.tsx \
            src/services/oauth/subscriptionAccess.test.ts \
            src/services/oauth/verbooStartupAuth.test.ts \
            src/utils/auth.refresh.test.ts

      - name: Smoke test
        run: bun run smoke

      - name: Build release artifacts
        run: bun run build

      - name: Verify npm package contents
        run: npm pack --dry-run

  publish-npm:
    name: Publish npm package
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://www.npmjs.com/package/@verboo/code
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.verify.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install and build
        run: |
          bun install --frozen-lockfile
          bun run build
          npm pack --dry-run

      - name: Clear token auth for trusted publishing
        run: |
          unset NODE_AUTH_TOKEN
          echo "NODE_AUTH_TOKEN=" >> "$GITHUB_ENV"

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Release summary
        env:
          RELEASE_TAG: ${{ needs.verify.outputs.tag }}
        run: |
          {
            echo "## Released $RELEASE_TAG"
            echo
            echo "- npm: https://www.npmjs.com/package/@verboo/code"
            echo "- GitHub: https://github.com/verbeux-ai/code/releases/tag/$RELEASE_TAG"
          } >> "$GITHUB_STEP_SUMMARY"

  docker:
    name: Build and push Docker image
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.verify.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.verify.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.verify.outputs.tag }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and load locally
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          load: true
          tags: verboo:smoke
          cache-from: type=gha

      - name: Smoke test
        run: docker run --rm verboo:smoke --version

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
